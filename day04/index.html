        Reverse an array

            result.push(arr[i])
        }

        Remove duplicates
        let arr = [45, 85, 7, 897, 8, 58, 5, 9, 5, 85, 8, 5, 855]
        let newArr = [];
        let result = [];
        for (let i = 0; i <= arr.length - 1; ++i) {
            newArr.push(i)
            for (let j = 0; j <= arr.length - 1; ++j) {
                if (i != j) {
                    result.push(j)
                }
            }

        }

        console.log(result)

        let arr = [1, 2, 2, 3, 4, 4, 5];//ek array hai 
        let unique = [];//mt array 

        for (let i = 0; i < arr.length; i++) {//i =0 i is lessthan arr.length ; jbtk i chotta hai uske ander ++ hogs 
            let isDuplicate = false;//ek varible bnaaya hai jiski by defaulte value false di hai 
            // console.log(unique);

            for (let j = 0; j < unique.length; j++) {
                if (arr[i] === unique[j]) {//arr[i]===unique[j]hai to isduplicater ki value ko true krega . 
                    // console.log(unique[j])//agar dono ki value equal nahi hai to isduplicate ki valuer falsde hi rhegi .
                    isDuplicate = true;
                    break;//yha pr line break ho rhi hai 
                }
            }
            if (!isDuplicate) {//
                unique.push(arr[i]);
            }

        }

        console.log(unique);
