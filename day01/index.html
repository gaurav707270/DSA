    <script>
         // Reverse an array Write a function to reverse the array [1, 2, 3, 4, 5] ✅ Expected Output: [5, 4, 3, 2, 1]

        function reverseArray(arr) {
    let result = [];

    for (let i = arr.length - 1; i >= 0; i--) {
        result.push(arr[i]);
    }

    return result;
}

console.log(reverseArray([1, 2, 3, 4, 5]));

    </script>
