<body>
    <script>

         // 2. Remove duplicates from an array Input: [1, 2, 2, 3, 4, 4, 5] ✅ Expected Output: [1, 2, 3, 4, 5]

        function sumNumbers(numbers) {
            let total_sum = 0;

            for (let num of numbers) {
                total_sum += num;
            }
            return total_sum;
        }

        console.log(sumNumbers([1, 2, 3, 4, 5]));




    </script>
