<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let num = 12345

        const sumOfNum = () => {
            let sum = 0
            let digit = 0

            while (num > 0) {
                digit += num % 10
                sum = sum * 10 + digit
                num = Math.floor(num / 10)
            }

            console.log(sum)
            // console.log(num)



        }

        sumOfNum(num)
    </script>
</body>

</html>
